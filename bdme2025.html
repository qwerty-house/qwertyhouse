        }
        .wheel-container {
            position: relative;
            width: 500px;
            height: 500px;
            max-width: 90vw;
            max-height: 90vw;
        }
        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #d4af37;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3), inset 0 0 20px rgba(0,0,0,0.8);
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
            cursor: pointer;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 55px;
            background: linear-gradient(to bottom, #ffd700, #b8860b);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 40;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.8));
        }
        .luxury-button {
            background: linear-gradient(135deg, #d4af37 0%, #f1c40f 50%, #b8860b 100%);
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        .luxury-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #f1c40f 0%, #ffffff 50%, #d4af37 100%);

        }
        .winner-modal {
            background: rgba(0, 0, 0, 0.98);
            border: 2px solid #d4af37;
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.3);
        }
        .gold-text {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 5px; }
        
        #uploadSection {
            transition: all 0.5s ease;
        }
        .hidden-view {
            display: none !important;
        }

        // ระบบจัดการไฟล์
        async function handleFile(file) {
            fileNameDisplay.textContent = `ไฟล์ที่เลือก: ${file.name}`;
            const reader = new FileReader();
            if (file.name.endsWith('.csv')) {
                reader.onload = (e) => {
                    initialDataStore = parseCSV(e.target.result);
                    enableStartButton();
                };
                reader.readAsText(file);
            } else {
                reader.onload = (e) => {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    initialDataStore = jsonData.slice(1)
                        .filter(row => row.length >= 5)
                        .map(row => ({
                            id: row[1]?.toString().trim() || "",
                            title: row[2]?.toString().trim() || "",
                            name: row[3]?.toString().trim() || "",
                            surname: row[4]?.toString().trim() || "",
                            district: row[5]?.toString().trim() || ""
                        }));
                    enableStartButton();
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function parseCSV(text) {
            const pattern = /"([^"]*(?:""[^"]*)*)"|([^,]+)|(?<=,|^)(?=,|$)/g;
            const lines = text.split(/\r?\n/);
            return lines.slice(1).map(line => {
                const matches = [...line.matchAll(pattern)];
                const row = matches.map(m => (m[1] !== undefined ? m[1].replace(/""/g, '"') : m[2])?.trim() || "");
                return { id: row[1], title: row[2], name: row[3], surname: row[4], district: row[5] };
            }).filter(p => p.name);
        }

        function enableStartButton() {
            if (initialDataStore.length > 0) {
                startWithDataBtn.disabled = false;
                startWithDataBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        function launchGame(data) {
            participants = JSON.parse(JSON.stringify(data));
            uploadSection.classList.add('hidden-view');
            gameView.classList.remove('hidden-view');
            updateUI();
            drawWheel();
        }

        startWithDataBtn.addEventListener('click', () => launchGame(initialDataStore));
        useDefaultBtn.addEventListener('click', () => launchGame(DEFAULT_DATA));

        // ระบบวงล้อและ UI
        function updateUI() {
            document.getElementById('remainingCount').innerText = participants.length;
            document.getElementById('winnerCount').innerText = winnersHistory.length;

            const list = document.getElementById('namesList');
            // แสดงชื่อ-นามสกุลเต็มในแถบข้าง
            list.innerHTML = participants.map(p => `
                <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/5 border border-[#d4af37]/5">
                    <div class="text-[8px] text-[#d4af37] opacity-60 w-8 truncate font-mono">${p.district}</div>
                    <div class="text-[11px] text-gray-300 truncate">
                        <span class="text-[#d4af37]/70 font-light">${p.title}</span> ${p.name} ${p.surname}
                    </div>
                </div>
            `).join('');

            const history = document.getElementById('historyList');
            // แสดงชื่อ-นามสกุลเต็มในประวัติ
            history.innerHTML = winnersHistory.map((w, index) => `
                <div class="flex justify-between items-center bg-white/5 p-1.5 rounded mb-1 border-l-2 border-[#d4af37]">
                    <span class="text-white">${index + 1}. ${w.name} ${w.surname}</span>
                    <span class="text-[8px] text-gray-600">${w.district}</span>
                </div>
            `).join('') || '<p class="text-gray-700 italic text-center py-2">No history</p>';
        }

        function drawWheel() {
            if (participants.length === 0) return;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 460;
            const step = (Math.PI * 2) / participants.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            participants.forEach((p, i) => {
                const angle = i * step;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + step);
                ctx.fillStyle = wheelColors[i % wheelColors.length];
                ctx.fill();
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + step / 2);
                const isDark = (['#000000', '#111111', '#0a0a0a', '#151515'].includes(wheelColors[i % wheelColors.length]));
                ctx.fillStyle = isDark ? '#d4af37' : '#000';
                
                // ในวงล้อแสดง: ชื่อ และอักษรแรกนามสกุล.
                const pSurnameChar = p.surname ? p.surname.trim().charAt(0) + "." : "";
                const displayName = p.name + " " + pSurnameChar;
                
                ctx.font = 'bold 20px Kanit';
                ctx.textAlign = 'right';
                const finalLabel = displayName.length > 15 ? displayName.substring(0,13)+'..' : displayName;
                ctx.fillText(finalLabel, radius - 50, 10);
                ctx.restore();
            });

            // ปุ่ม READY ตรงกลาง
            const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 80);
            grad.addColorStop(0, '#fff7ad');
            grad.addColorStop(0.5, '#d4af37');
            grad.addColorStop(1, '#b8860b');
            ctx.beginPath();
            ctx.arc(centerX, centerY, 80, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.font = 'bold 24px Kanit';
            ctx.textAlign = 'center';
            ctx.fillText("READY", centerX, centerY + 8);
        }

        function spin() {
            if (isSpinning || participants.length === 0) return;
            isSpinning = true;
            spinBtn.disabled = true;
            const extraSpins = 8 + Math.random() * 5; 
            const randomStop = Math.random() * (Math.PI * 2);
            const totalRotation = extraSpins * Math.PI * 2 + randomStop;
            currentRotation += totalRotation;
            canvas.style.transform = `rotate(-${currentRotation}rad)`;
            setTimeout(() => {
                const normalizedRotation = (3 * Math.PI / 2 + currentRotation) % (Math.PI * 2);
                const step = (Math.PI * 2) / participants.length;
                const winnerIndex = Math.floor(normalizedRotation / step);
                showWinner(participants[winnerIndex] || participants[0], winnerIndex);
                isSpinning = false;
                spinBtn.disabled = false;
            }, 6000);
        }

        function showWinner(winner, index) {
            document.getElementById('winnerFirstName').innerText = `${winner.title}${winner.name}`;
            document.getElementById('winnerLastName').innerText = winner.surname;
            document.getElementById('winnerDetailDisplay').innerText = `BDM Code: ${winner.id} | District: ${winner.district}`;
            confetti({ particleCount: 200, spread: 120, origin: { y: 0.6 }, colors: ['#d4af37', '#ffffff', '#ffd700'] });
            winnerModal.classList.remove('hidden');
            setTimeout(() => {
                winnerModal.classList.add('opacity-100');
                modalContent.classList.remove('scale-50');
                modalContent.classList.add('scale-100');
            }, 50);
            winnersHistory.unshift(winner);
            participants.splice(index, 1);
            updateUI();
            if (participants.length > 0) drawWheel();
        }

        function closeModal() {
            winnerModal.classList.remove('opacity-100');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-50');
            setTimeout(() => winnerModal.classList.add('hidden'), 500);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width * 1000 - 500;
            const y = (e.clientY - rect.top) / rect.height * 1000 - 500;
            if (Math.sqrt(x*x + y*y) < 160) spin();
        });

        spinBtn.addEventListener('click', spin);
        resetBtn.addEventListener('click', () => location.reload());
        closeModalBtn.addEventListener('click', closeModal);
    </script>
</body>
</html>
