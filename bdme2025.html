<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 BDM BDE Recognition Awards</title>

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #d4af37;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .wheel-container {
            position: relative;
            width: 580px;
            height: 580px;
            max-width: 95vw;
            max-height: 95vw;
        }
        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #d4af37;
            box-shadow: 0 0 70px rgba(212, 175, 55, 0.4), inset 0 0 40px rgba(0,0,0,0.9);
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }
        /* วงกลมตรงกลางที่ไม่หมุนตาม */
        .center-stationary {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, #fff7ad 0%, #d4af37 50%, #b8860b 100%);
            border-radius: 50%;
            border: 6px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer;
            user-select: none;
        }
        .pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 70px;
            background: linear-gradient(to bottom, #ffd700, #b8860b);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 60;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.9));
        }
        .luxury-button {
            background: linear-gradient(135deg, #d4af37 0%, #f1c40f 50%, #b8860b 100%);
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
        }
        .luxury-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #f1c40f 0%, #ffffff 50%, #d4af37 100%);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 30px rgba(212, 175, 55, 0.7);
        }
        .winner-modal {
            background: rgba(5, 5, 5, 0.99);
            border: 2px solid #d4af37;
            box-shadow: 0 0 150px rgba(212, 175, 55, 0.5);
        }
        .gold-text {
            background: linear-gradient(to bottom, #fff7ad 0%, #d4af37 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0a0a0a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
        
        @keyframes pulse-gold {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pulse-gold { animation: pulse-gold 2s infinite ease-in-out; }
    </style>
</head>

            <!-- Dashboard -->

                    </h2>
                    <div id="namesList" class="flex-1 overflow-y-auto pr-2 custom-scrollbar grid grid-cols-1 md:grid-cols-2 gap-3 content-start"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Winner Modal -->

        const ctx = canvas.getContext('2d');
        const wheelColors = ['#000000', '#B8860B', '#111111', '#D4AF37', '#0a0a0a', '#FFD700', '#151515', '#DAA520'];

        const uploadSection = document.getElementById('uploadSection');
        const gameView = document.getElementById('gameView');
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const winnerModal = document.getElementById('winnerModal');
        const modalContent = document.getElementById('modalContent');
        const centerStationary = document.getElementById('centerStationary');

        function clean(s) { return s ? s.toString().trim() : ""; }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').textContent = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, { type: 'array', codepage: 874 });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                initialDataStore = json.slice(1).filter(r => r[3]).map((r, i) => ({
                    rank: clean(r[0]) || (i + 1), id: clean(r[1]), title: clean(r[2]), name: clean(r[3]),
                    surname: clean(r[4]), district: clean(r[5])
                }));
                if (initialDataStore.length > 0) {
                    const startBtn = document.getElementById('startWithDataBtn');
                    startBtn.disabled = false;
                    startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function launch(data) {
            initialChosenData = JSON.parse(JSON.stringify(data));
            participants = data.map((p, i) => ({ ...p, originalOrder: parseInt(p.rank) || (i + 1) }));
            uploadSection.classList.add('hidden');
            gameView.classList.remove('hidden');
            setTimeout(() => gameView.classList.add('opacity-100'), 50);
            update();
            draw();
        }

        document.getElementById('startWithDataBtn').onclick = () => launch(initialDataStore);
        document.getElementById('useDefaultBtn').onclick = () => launch(DEFAULT_DATA);

            if(confirm('ต้องการล้างประวัติรางวัลและเริ่มสุ่มใหม่จากรายชื่อทั้งหมดใช่หรือไม่?')) {
                winnersHistory = [];
                participants = initialChosenData.map((p, i) => ({ ...p, originalOrder: parseInt(p.rank) || (i + 1) }));
                currentRotation = 0;
                canvas.style.transition = 'none';
                canvas.style.transform = 'rotate(0rad)';
                setTimeout(() => {
                    canvas.style.transition = 'transform 6s cubic-bezier(0.15, 0, 0.15, 1)';
                    update();
                    draw();
                }, 50);
            }
        };

        function update() {
            document.getElementById('remainingCount').innerText = participants.length;
            document.getElementById('winnerCount').innerText = winnersHistory.length;
            document.getElementById('listStatus').innerText = `${participants.length} ท่าน`;
            const list = document.getElementById('namesList');
            list.innerHTML = participants.map(p => `
                <div class="flex items-center gap-4 p-4 rounded-xl bg-white/5 border border-[#d4af37]/10 hover:border-[#d4af37]/40 transition group">
                    <div class="w-10 h-10 rounded-full bg-[#d4af37]/20 flex items-center justify-center text-[12px] font-bold text-[#d4af37] border border-[#d4af37]/20 flex-shrink-0 group-hover:bg-[#d4af37] group-hover:text-black transition">
                        ${p.originalOrder}
                    </div>
                    <div class="text-sm text-gray-300 truncate flex-1 flex flex-col">
                        <span class="text-[10px] text-gray-500 block uppercase">${p.district}</span>
                        <div class="truncate">
                            <span class="text-[#d4af37] font-semibold">${p.title}</span> ${p.name} ${p.surname}
                        </div>
                    </div>
                </div>
            `).join('');
            const history = document.getElementById('historyList');
            history.innerHTML = winnersHistory.map((w, i) => `
                <div class="flex justify-between items-center bg-[#d4af37]/10 p-3 rounded-xl border-l-4 border-[#d4af37] shadow-lg">
                    <div class="flex flex-col"><span class="text-white text-xs font-medium">${w.name} ${w.surname}</span><span class="text-[9px] text-[#d4af37] uppercase">${w.district}</span></div>
                    <div class="flex items-center gap-2"><span class="text-[10px] text-gray-600">ID ${w.originalOrder}</span><span class="text-[#d4af37] font-bold text-lg">#${winnersHistory.length - i}</span></div>
                </div>
            `).join('') || '<p class="text-gray-700 italic text-center py-4 w-full">ยังไม่มีผู้ได้รับรางวัล</p>';
        }

        function draw() {
            if (!participants.length) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
            const centerX = canvas.width / 2, centerY = canvas.height / 2, radius = 560, step = (Math.PI * 2) / participants.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            participants.forEach((p, i) => {
                const angle = i * step;
                ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.arc(centerX, centerY, radius, angle, angle + step);
                ctx.fillStyle = wheelColors[i % wheelColors.length]; ctx.fill();
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)'; ctx.lineWidth = 1; ctx.stroke();
                ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(angle + step / 2);
                ctx.fillStyle = (['#000', '#111', '#0a0', '#151'].includes(wheelColors[i % wheelColors.length])) ? '#d4af37' : '#000';
                const fontSize = participants.length > 50 ? '26px' : (participants.length > 30 ? '34px' : '44px');
                ctx.font = `bold ${fontSize} Kanit`; ctx.textAlign = 'right';
                const displayName = `${p.name} ${p.surname.charAt(0)}.`;
                ctx.fillText(displayName, radius - 70, 15); ctx.restore();
            });
        }

        function spin() {
            if (isSpinning || !participants.length) return;
            isSpinning = true; spinBtn.disabled = true;
            const totalRotation = (12 + Math.random() * 8) * Math.PI * 2 + Math.random() * (Math.PI * 2);
            currentRotation += totalRotation;
            canvas.style.transform = `rotate(-${currentRotation}rad)`;
            setTimeout(() => {
                const norm = (currentRotation + (Math.PI / 2)) % (Math.PI * 2);
                const step = (Math.PI * 2) / participants.length;
                let idx = Math.floor((Math.PI * 2 - norm) / step) % participants.length;
                if (idx < 0) idx += participants.length;
                const winner = participants[idx];
                document.getElementById('winnerFirstName').innerText = winner.title + winner.name;
                document.getElementById('winnerLastName').innerText = winner.surname;
                document.getElementById('winnerIdDisplay').innerText = `BDM Code: ${winner.id} | ลำดับที่ ${winner.originalOrder}`;
                document.getElementById('winnerDistrictDisplay').innerText = `District: ${winner.district}`;
                confetti({ particleCount: 300, spread: 160, origin: { y: 0.6 }, colors: ['#d4af37', '#fff', '#ffd700'] });
                winnerModal.classList.remove('hidden');
                setTimeout(() => { winnerModal.classList.add('opacity-100'); modalContent.classList.replace('scale-50', 'scale-100'); }, 50);
                winnersHistory.unshift(winner); participants.splice(idx, 1);
                update(); if (participants.length) draw();
                isSpinning = false; spinBtn.disabled = false;
            }, 6000);
        }

        spinBtn.onclick = spin;
        centerStationary.onclick = spin;
        document.getElementById('closeModalBtn').onclick = () => {
            winnerModal.classList.remove('opacity-100'); 
            modalContent.classList.replace('scale-100', 'scale-50');
            setTimeout(() => winnerModal.classList.add('hidden'), 500);
        };
    </script>
</body>
</html>
