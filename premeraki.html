<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERAKI Seed Cycling Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFBF7; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const App = () => {
            const [step, setStep] = useState(0); 
            const [answers, setAnswers] = useState({
                goal: '', regularity: '', medical: [], allergies: [], pregnancy: '', birthControl: ''
            });

            // อัปเดตไอคอน Lucide ทุกครั้งที่เปลี่ยนหน้า
            useEffect(() => { lucide.createIcons(); });

            const nextStep = () => setStep(prev => prev + 1);
            const prevStep = () => setStep(prev => prev - 1);
            const resetQuiz = () => {
                setStep(0);
                setAnswers({ goal: '', regularity: '', medical: [], allergies: [], pregnancy: '', birthControl: '' });
            };

            const handleSelect = (field, value) => {
                setAnswers(prev => ({ ...prev, [field]: value }));
                if (field !== 'medical' && field !== 'allergies') nextStep();
            };

            const toggleSelection = (field, value) => {
                const current = [...answers[field]];
                if (current.includes(value)) {
                    setAnswers({ ...answers, [field]: current.filter(v => v !== value) });
                } else {
                    setAnswers({ ...answers, [field]: [...current, value] });
                }
            };

            const getResult = () => {
                const { goal, regularity, medical, pregnancy, allergies, birthControl } = answers;
                if (allergies.some(a => ['flax', 'pumpkin', 'sesame', 'sunflower'].includes(a))) return 'ALLERGY_FORBIDDEN';
                if (pregnancy === 'yes' || medical.includes('cancer') || medical.includes('warfarin')) return 'CONSULT_DOCTOR';
                if (medical.includes('endo') || medical.includes('cysts') || medical.includes('fibroids')) return 'ENDO_SPECIAL';
                if (regularity === 'irregular' || goal === 'pcos') return 'PCOS_MOON';
                if (goal === 'pregnancy') return 'PREP_PREGNANCY';
                if (birthControl !== 'none') return 'BIRTH_CONTROL_BRIDGE';
                return 'STANDARD_PMS';
            };

            const resultKey = getResult();
            const results = {
                ALLERGY_FORBIDDEN: { title: "ขออภัย คุณลูกค้าไม่สามารถทานได้ค่ะ ⚠️", description: "เนื่องจากมีประวัติแพ้เมล็ดพืชหลัก แอดมินไม่แนะนำเพื่อความปลอดภัยนะคะ", color: "text-rose-700", bg: "bg-rose-50", hideCTA: true },
                CONSULT_DOCTOR: { title: "แนะนำให้ปรึกษาแพทย์ก่อนนะคะ 👩‍⚕️", description: "เนื่องจากมีภาวะร่างกายที่ละเอียดอ่อน แนะนำให้ปรึกษาแพทย์ก่อนเริ่มทานค่ะ", copyMsg: "ปรึกษาเรื่องเงื่อนไขสุขภาพค่ะ", color: "text-rose-700", bg: "bg-rose-50" },
                ENDO_SPECIAL: { title: "สูตรพิเศษ (Endo Set) 🌸", description: "เน้นลดการอักเสบและดูแลมดลูกระยะยาวค่ะ", package: "เซตพิเศษ Endo 3 เดือน", copyMsg: "สนใจเซต Endo 3 เดือนค่ะ" },
                PCOS_MOON: { title: "สูตรปรับสมดุลพระจันทร์ 🌙", description: "สำหรับรอบเดือนไม่ปกติ ใช้รอบธรรมชาติช่วยจัดจังหวะใหม่ค่ะ", package: "เซตฟื้นฟูรังไข่ 6 เดือน", copyMsg: "สนใจเซตฟู 6 เดือนค่ะ" },
                PREP_PREGNANCY: { title: "สูตรเตรียมพร้อมมีเบบี๋ 👶🏻", description: "บำรุงไข่ให้มีคุณภาพ และเตรียมผนังมดลูกให้พร้อมค่ะ", package: "เซตบำรุงเตรียมพร้อมมีน้อง 3 เดือน", copyMsg: "สนใจเซตบำรุง 3 เดือนค่ะ" },
                BIRTH_CONTROL_BRIDGE: { title: "สูตรกู้คืนสมดุลจากยาคุม 🌿", description: "เติมวิตามินที่ร่างกายขาดหายและขับฮอร์โมนส่วนเกินค่ะ", package: "เซตปรับสมดุลร่างกาย 3 เดือน", copyMsg: "สนใจเซตปรับสมดุล 3 เดือนค่ะ" },
                STANDARD_PMS: { title: "สูตรสมดุลผิวสวย อารมณ์นิ่ง ✨", description: "ลดอาการปวดท้อง สิวบุก หรืออารมณ์สวิงช่วงมีประจำเดือนค่ะ", package: "เซตสวย 3 เดือน", copyMsg: "สนใจเซตสวย 3 เดือนค่ะ" }
            };

            const res = results[resultKey] || results['STANDARD_PMS'];

            return (
                <div className="min-h-screen p-6 flex flex-col items-center">
                    <div className="w-full max-w-md text-center mt-8 mb-10">
                        <h1 className="text-4xl font-light text-[#A51D24] tracking-widest mb-1">MERAKI</h1>
                        <p className="text-red-300 text-[10px] uppercase tracking-[0.3em] font-bold">Seed Cycling</p>
                    </div>

                    <div className="w-full max-w-md bg-white rounded-[2.5rem] shadow-xl p-8 border border-red-50">
                        {step === 0 && (
                            <div className="text-center space-y-8 fade-in">
                                <div className="w-20 h-20 bg-red-50 rounded-full mx-auto flex items-center justify-center">
                                    <i data-lucide="heart" className="w-10 h-10 text-[#A51D24]"></i>
                                </div>
                                <h2 className="text-2xl font-bold text-gray-800">Balance Your Life<br/><span className="text-[#A51D24]">With Seed Cycling</span></h2>
                                <button onClick={nextStep} className="w-full bg-[#A51D24] text-white font-bold py-4 rounded-full flex items-center justify-center">
                                    เริ่มประเมินสุขภาพ <i data-lucide="chevron-right" className="ml-2 w-5 h-5"></i>
                                </button>
                            </div>
                        )}

                        {step > 0 && step < 6 && (
                            <div className="fade-in space-y-6">
                                <h2 className="text-xl font-bold text-gray-800">
                                    {step === 1 && "เป้าหมายที่คุณกังวลคือ?"}
                                    {step === 2 && "รอบเดือนของคุณเป็นอย่างไร?"}
                                    {step === 3 && "มีประวัติสุขภาพเหล่านี้ไหม?"}
                                    {step === 4 && "แพ้เมล็ดพืชเหล่านี้ไหม?"}
                                    {step === 5 && "ปัจจุบันใช้ยาคุมไหม?"}
                                </h2>
                                
                                <div className="grid gap-3">
                                    {step === 1 && ['pms', 'pcos', 'pregnancy', 'menopause', 'general'].map(id => (
                                        <button key={id} onClick={() => handleSelect('goal', id)} className="text-left p-4 rounded-xl border border-red-50 bg-[#FDFBF7] hover:bg-white text-sm">
                                            {id === 'pms' && 'ปวดท้องเมนส์ / สิวฮอร์โมน'}
                                            {id === 'pcos' && 'PCOS / เมนส์มาไม่ปกติ'}
                                            {id === 'pregnancy' && 'เตรียมพร้อมมีน้อง'}
                                            {id === 'menopause' && 'วัยทอง / ร้อนวูบวาบ'}
                                            {id === 'general' && 'ดูแลสุขภาพทั่วไป'}
                                        </button>
                                    ))}
                                    {step === 2 && ['regular', 'irregular', 'none'].map(id => (
                                        <button key={id} onClick={() => handleSelect('regularity', id)} className="text-left p-4 rounded-xl border border-red-50 bg-[#FDFBF7] text-sm">
                                            {id === 'regular' ? 'สม่ำเสมอ' : id === 'irregular' ? 'มาไม่ปกติ' : 'หมดประจำเดือน'}
                                        </button>
                                    ))}
                                    {step === 3 && ['endo', 'cysts', 'fibroids', 'cancer', 'none'].map(id => (
                                        <button key={id} onClick={() => id === 'none' ? (setAnswers({...answers, medical:[]}), nextStep()) : toggleSelection('medical', id)}
                                            className={`text-left p-4 rounded-xl border ${answers.medical.includes(id) ? 'border-[#A51D24] bg-red-50' : 'border-red-50'}`}>
                                            {id === 'endo' && 'เยื่อบุมดลูกเจริญผิดที่'}
                                            {id === 'cysts' && 'ช็อกโกแลตซีสต์'}
                                            {id === 'fibroids' && 'เนื้องอกมดลูก'}
                                            {id === 'cancer' && 'มะเร็ง / ทานยาละลายลิ่มเลือด'}
                                            {id === 'none' && 'ไม่มีประวัติข้างต้น'}
                                        </button>
                                    ))}
                                    {step === 4 && ['flax', 'pumpkin', 'sesame', 'sunflower', 'none'].map(id => (
                                        <button key={id} onClick={() => id === 'none' ? setAnswers({...answers, allergies:['none']}) : toggleSelection('allergies', id)}
                                            className={`text-left p-4 rounded-xl border ${answers.allergies.includes(id) ? 'border-[#A51D24] bg-red-50' : 'border-red-50'}`}>
                                            แพ้เมล็ด{id}
                                        </button>
                                    ))}
                                    {step === 5 && ['yes', 'none'].map(id => (
                                        <button key={id} onClick={() => handleSelect('birthControl', id)} className="text-left p-4 rounded-xl border border-red-50 bg-[#FDFBF7] text-sm">
                                            {id === 'yes' ? 'ใช้ยาคุม / ฝัง / ฉีด' : 'ไม่ได้ใช้'}
                                        </button>
                                    ))}
                                </div>

                                { (step === 3 || step === 4) && (
                                    <button onClick={nextStep} className="w-full bg-[#A51D24] text-white py-4 rounded-full font-bold mt-4 shadow-lg">ยืนยัน</button>
                                )}
                                <button onClick={prevStep} className="w-full text-gray-400 text-xs font-bold mt-2">ย้อนกลับ</button>
                            </div>
                        )}

                        {step === 6 && (
                            <div className="fade-in space-y-6">
                                <div className={`p-6 rounded-2xl ${res.bg || 'bg-[#FDFBF7]'} border border-red-100`}>
                                    <h2 className={`text-xl font-bold ${res.color || 'text-[#A51D24]'} mb-2`}>{res.title}</h2>
                                    <p className="text-gray-600 text-sm italic">{res.description}</p>
                                    {res.package && <p className="mt-4 font-bold text-[#A51D24]">เซตแนะนำ: {res.package}</p>}
                                </div>
                                {!res.hideCTA && (
                                    <button onClick={() => window.open(`https://line.me/ti/p/@meraki?text=${encodeURIComponent('ผลประเมิน: ' + res.copyMsg)}`)}
                                        className="w-full bg-[#A51D24] text-white font-bold py-5 rounded-full shadow-xl flex items-center justify-center gap-2">
                                        <i data-lucide="message-circle" className="w-5 h-5"></i> สั่งซื้อ / ปรึกษาแอดมิน
                                    </button>
                                )}
                                <button onClick={resetQuiz} className="w-full text-gray-400 text-sm flex items-center justify-center gap-2">
                                    <i data-lucide="refresh-cw" className="w-4 h-4"></i> เริ่มประเมินใหม่
                                </button>
                            </div>
                        )}
                    </div>
                    <p className="mt-8 text-[10px] text-gray-300 tracking-[0.4em] uppercase font-bold">Nature is the best medicine</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
