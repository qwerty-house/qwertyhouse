<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERAKI - Seed Cycling Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Bodoni Moda', serif; }
        /* สไตล์อนิเมชั่นพื้นฐาน */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#FDFBF7]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // ดึงไอคอนที่ต้องใช้
        const { 
            ChevronRight, ChevronLeft, CheckCircle2, MessageCircle, 
            Sparkles, Moon, RefreshCw, XCircle, Calendar, Heart 
        } = lucide;

        const App = () => {
            const [step, setStep] = useState(0); 
            const [answers, setAnswers] = useState({
                goal: '', regularity: '', medical: [],
                allergies: [], pregnancy: '', birthControl: ''
            });

            // อัปเดตไอคอนหลังจาก Render
            useEffect(() => { lucide.createIcons(); }, [step]);

            const nextStep = () => setStep(prev => prev + 1);
            const prevStep = () => setStep(prev => prev - 1);
            const resetQuiz = () => {
                setStep(0);
                setAnswers({ goal: '', regularity: '', medical: [], allergies: [], pregnancy: '', birthControl: '' });
            };

            const handleSelect = (field, value) => {
                setAnswers(prev => ({ ...prev, [field]: value }));
                if (field !== 'medical' && field !== 'allergies') nextStep();
            };

            const toggleSelection = (field, value) => {
                const current = [...answers[field]];
                if (current.includes(value)) {
                    setAnswers({ ...answers, [field]: current.filter(v => v !== value) });
                } else {
                    setAnswers({ ...answers, [field]: [...current, value] });
                }
            };

            const getResult = () => {
                const { goal, regularity, medical, pregnancy, birthControl, allergies } = answers;
                const criticalSeeds = ['flax', 'pumpkin', 'sesame', 'sunflower'];
                const hasCriticalAllergy = allergies.some(a => criticalSeeds.includes(a));

                if (hasCriticalAllergy) return 'ALLERGY_FORBIDDEN';
                if (pregnancy === 'yes' || medical.includes('cancer') || medical.includes('warfarin')) return 'CONSULT_DOCTOR';
                if (medical.includes('endo') || medical.includes('cysts') || medical.includes('fibroids')) return 'ENDO_SPECIAL';
                if (regularity === 'irregular' || goal === 'pcos') return 'PCOS_MOON';
                if (goal === 'pregnancy') return 'PREP_PREGNANCY';
                if (birthControl !== 'none') return 'BIRTH_CONTROL_BRIDGE';
                return 'STANDARD_PMS';
            };

            const resultKey = getResult();

            const ResultDisplay = () => {
                const results = {
                    ALLERGY_FORBIDDEN: {
                        title: "ขออภัย คุณลูกค้าไม่สามารถทานได้ค่ะ ⚠️",
                        description: "เนื่องจาก Seed Cycling ของ Meraki ประกอบด้วยเมล็ดพืช 4 ชนิดเป็นหลัก หากคุณลูกค้ามีประวัติแพ้เมล็ดพืชในกลุ่มนี้ แอดมินไม่แนะนำให้ทานเพื่อความปลอดภัยสูงสุดนะคะ",
                        note: "* อาการแพ้อาหารรุนแรงอาจเป็นอันตรายถึงชีวิต แอดมินเป็นห่วงสุขภาพของคุณลูกค้าที่สุดค่ะ",
                        color: "text-rose-700", bg: "bg-rose-50", hideCTA: true
                    },
                    CONSULT_DOCTOR: {
                        title: "แนะนำให้ปรึกษาแพทย์ก่อนนะคะ 👩‍⚕️",
                        description: "เนื่องจากคุณลูกค้ามีภาวะร่างกายที่ละเอียดอ่อน เพื่อความปลอดภัยสูงสุด แอดมินแนะนำให้ปรึกษาคุณหมอเจ้าของไข้ก่อนเริ่มทำ Seed Cycling นะคะ",
                        cta: "สอบถามแอดมินเพิ่มเติม", color: "text-rose-700", bg: "bg-rose-50",
                        copyMsg: "ต้องการปรึกษาเพิ่มเติมเนื่องจากมีเงื่อนไขด้านสุขภาพค่ะ"
                    },
                    ENDO_SPECIAL: {
                        title: "Seed Cycling สูตรพิเศษ (Endo Set) 🌸",
                        description: "เน้นการลดการอักเสบและควบคุมเอสโตรเจนไม่ให้สูงเกินไป เพื่อดูแลภาวะเยื่อบุ/ซีสต์โดยเฉพาะค่ะ",
                        instruction: "ทานเฉพาะถุง Phase 2 (เมล็ดงาและทานตะวัน) ต่อเนื่อง 28 วัน เริ่มวันแรกที่ประจำเดือนมา หรือวัน New Moon ก็ได้ค่ะ",
                        package: "เซตพิเศษ Endo 3 เดือน (ดูแลมดลูกระยะยาว)",
                        copyMsg: "สนใจเซตพิเศษ Endo 3 เดือนค่ะ (กลุ่ม Endo/Cyst)"
                    },
                    PCOS_MOON: {
                        title: "Seed Cycling สูตรปรับสมดุลพระจันทร์ 🌙",
                        description: "สำหรับ PCOS หรือรอบเดือนไม่ปกติ เราจะใช้รอบธรรมชาติของพระจันทร์ช่วยจัดจังหวะฮอร์โมนใหม่ค่ะ",
                        instruction: "เริ่ม Phase 1 ในวัน New Moon (เดือนดับ) 14 วัน แล้วสลับเป็น Phase 2 อีก 14 วันค่ะ",
                        package: "เซตฟื้นฟูรังไข่ 6 เดือน (คุ้มค่าที่สุด ตกวันละ 49 บาท)",
                        copyMsg: "สนใจเซตฟื้นฟู 6 เดือนค่ะ (กลุ่ม PCOS/รอบไม่ปกติ)"
                    },
                    PREP_PREGNANCY: {
                        title: "Seed Cycling สูตรเตรียมพร้อมมีเบบี๋ 👶🏻",
                        description: "บำรุงไข่ให้มีคุณภาพ และเตรียมผนังมดลูกให้อุ่นนุ่มพร้อมสำหรับการฝังตัวค่ะ",
                        instruction: "ทาน Phase 1 (1-14 วันแรก) บำรุงไข่ และ Phase 2 (15-28 วัน) เตรียมผนังมดลูก",
                        package: "เซตบำรุงเตรียมพร้อมมีน้อง 3 เดือน",
                        copyMsg: "สนใจเซตบำรุง 3 เดือนค่ะ (กลุ่มเตรียมตั้งครรภ์)"
                    },
                    BIRTH_CONTROL_BRIDGE: {
                        title: "Seed Cycling สูตรกู้คืนสมดุลจากยาคุม 🌿",
                        description: "ช่วยเติมวิตามินที่ร่างกายขาดหายและช่วยให้ตับขับฮอร์โมนสังเคราะห์ส่วนเกินออกได้ดีขึ้นค่ะ",
                        instruction: "ทานควบคู่ยาคุมไปก่อน 3 เดือนเพื่อเติมสารอาหาร เมื่อหยุดยาแล้วให้ทานต่อเนื่องเพื่อลดอาการสิวเห่อ/ผมร่วง",
                        package: "เซตปรับสมดุลร่างกาย 3 เดือน",
                        copyMsg: "สนใจเซตปรับสมดุล 3 เดือนค่ะ (กลุ่มใช้ยาคุม)"
                    },
                    STANDARD_PMS: {
                        title: "Seed Cycling สูตรสมดุลผิวสวย อารมณ์นิ่ง ✨",
                        description: "สำหรับรอบเดือนปกติ แต่อยากลดอาการปวดท้อง สิวบุก หรืออารมณ์สวิงช่วงก่อนเมนส์มาค่ะ",
                        instruction: "เริ่ม Phase 1 วันแรกที่ประจำเดือนมา 14 วัน แล้วเปลี่ยนเป็น Phase 2 อีก 14 วัน",
                        package: "เซตสวย 3 เดือน (ดูแลครบวงจร ส่งฟรี!)",
                        copyMsg: "สนใจเซตสวย 3 เดือนค่ะ (กลุ่ม PMS/สิวฮอร์โมน)"
                    }
                };

                const res = results[resultKey] || results['STANDARD_PMS'];

                return (
                    <div className="space-y-8 fade-in">
                        <div className={`p-8 rounded-[2rem] ${res.bg || 'bg-[#FDFBF7]'} border border-red-100 shadow-sm relative overflow-hidden`}>
                            <h2 className={`text-2xl font-serif font-bold ${res.color || 'text-[#A51D24]'} mb-4`}>{res.title}</h2>
                            <p className="text-gray-600 mb-6 font-light italic">{res.description}</p>
                            {res.instruction && (
                                <div className="bg-white/60 p-5 rounded-2xl mb-6 border border-red-50 text-sm">
                                    <strong className="text-[#A51D24] block mb-1">วิธีทานที่แนะนำ:</strong>
                                    {res.instruction}
                                </div>
                            )}
                            {!res.hideCTA && (
                                <div className="pt-6 border-t border-red-100">
                                    <p className="text-[10px] uppercase tracking-widest text-gray-400 mb-1">Recommended Package</p>
                                    <p className="text-xl font-serif font-bold text-[#A51D24]">{res.package}</p>
                                </div>
                            )}
                        </div>
                        <div className="space-y-3">
                            <button onClick={() => window.open(`https://line.me/ti/p/@meraki?text=${encodeURIComponent('สวัสดีค่ะ ผลประเมินคือ: ' + res.copyMsg)}`)}
                                className="w-full bg-[#A51D24] text-white font-bold py-5 rounded-full shadow-xl flex items-center justify-center gap-3">
                                <i data-lucide="message-circle" className="w-5 h-5"></i> สั่งซื้อ / ปรึกษาแอดมิน
                            </button>
                            <button onClick={resetQuiz} className="w-full text-gray-400 text-sm py-4 flex items-center justify-center gap-2">
                                <i data-lucide="refresh-cw" className="w-4 h-4"></i> เริ่มใหม่
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-6 text-[#2D2D2D]">
                    <div className="w-full max-w-md mt-6 mb-12 text-center">
                        <h1 className="text-4xl font-serif font-light text-[#A51D24] tracking-[0.15em] mb-1">MERAKI</h1>
                        <p className="text-red-300 text-[10px] uppercase tracking-[0.3em] font-bold">Seed Cycling</p>
                    </div>

                    <div className="w-full max-w-md bg-white rounded-[3rem] shadow-2xl p-10 border border-red-50/50">
                        {step === 0 && (
                            <div className="text-center space-y-8 fade-in">
                                <div className="w-24 h-24 bg-red-50 rounded-full mx-auto flex items-center justify-center">
                                    <i data-lucide="heart" className="w-10 h-10 text-[#A51D24]"></i>
                                </div>
                                <h2 className="text-3xl font-serif font-bold text-gray-800">Balance Your Life<br/><span className="text-[#A51D24]">With Seed Cycling</span></h2>
                                <button onClick={nextStep} className="w-full bg-[#A51D24] text-white font-bold py-5 rounded-full flex items-center justify-center group">
                                    เริ่มประเมินสุขภาพ <i data-lucide="chevron-right" className="ml-2"></i>
                                </button>
                            </div>
                        )}

                        {step === 1 && (
                            <div className="space-y-8 fade-in">
                                <h2 className="text-2xl font-serif font-bold text-gray-800">เป้าหมายหลักคือ?</h2>
                                <div className="grid gap-3">
                                    {['pms', 'pcos', 'pregnancy', 'menopause', 'general'].map(id => (
                                        <button key={id} onClick={() => handleSelect('goal', id)} className="text-left p-5 rounded-2xl border border-red-50 bg-[#FDFBF7] hover:bg-white text-sm font-medium">
                                            {id === 'pms' && 'ปวดท้องเมนส์ / สิวฮอร์โมน'}
                                            {id === 'pcos' && 'PCOS / ประจำเดือนไม่ปกติ'}
                                            {id === 'pregnancy' && 'เตรียมพร้อมมีเบบี๋ / บำรุงไข่'}
                                            {id === 'menopause' && 'วัยทอง / ร้อนวูบวาบ'}
                                            {id === 'general' && 'ดูแลสุขภาพทั่วไป'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-8 fade-in">
                                <h2 className="text-2xl font-serif font-bold text-gray-800">วงจรรอบเดือนเป็นอย่างไร?</h2>
                                <div className="grid gap-3">
                                    {['regular', 'irregular', 'none'].map(id => (
                                        <button key={id} onClick={() => handleSelect('regularity', id)} className="text-left p-5 rounded-2xl border border-red-50 bg-[#FDFBF7] text-sm font-medium">
                                            {id === 'regular' ? 'มาสม่ำเสมอ' : id === 'irregular' ? 'มาไม่ปกติ' : 'หมดประจำเดือน'}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={prevStep} className="text-gray-400 text-xs font-bold uppercase tracking-widest flex items-center gap-1">
                                    <i data-lucide="chevron-left" className="w-3 h-3"></i> Back
                                </button>
                            </div>
                        )}

                        {step === 3 && (
                             <div className="space-y-8 fade-in">
                                <h2 className="text-2xl font-serif font-bold text-[#A51D24]">ประวัติสุขภาพ</h2>
                                <div className="grid gap-2">
                                    {[{id:'endo', l:'เยื่อบุมดลูกเจริญผิดที่'}, {id:'cysts', l:'ช็อกโกแลตซีสต์'}, {id:'fibroids', l:'เนื้องอกมดลูก'}, {id:'cancer', l:'มะเร็ง'}, {id:'none', l:'ไม่มี'}]
                                    .map(opt => (
                                        <button key={opt.id} onClick={() => opt.id === 'none' ? (setAnswers({...answers, medical:[]}), nextStep()) : toggleSelection('medical', opt.id)}
                                            className={`text-left p-4 rounded-2xl border ${answers.medical.includes(opt.id) ? 'border-[#A51D24] bg-red-50' : 'border-red-50'}`}>
                                            {opt.l}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={nextStep} className="w-full bg-[#A51D24] text-white py-4 rounded-full font-bold">Confirm</button>
                            </div>
                        )}

                        {step === 4 && (
                            <div className="space-y-8 fade-in">
                                <h2 className="text-2xl font-serif font-bold text-gray-800">แพ้อาหารหรือไม่?</h2>
                                <div className="grid gap-2 text-xs">
                                    {['flax', 'pumpkin', 'sesame', 'sunflower', 'none'].map(id => (
                                        <button key={id} onClick={() => id === 'none' ? setAnswers({...answers, allergies:['none']}) : toggleSelection('allergies', id)}
                                            className={`p-4 rounded-xl border ${answers.allergies.includes(id) ? 'border-[#A51D24] bg-red-50' : 'border-red-50'}`}>
                                            แพ้เมล็ด{id}
                                        </button>
                                    ))}
                                </div>
                                <div className="p-5 bg-gray-50 rounded-2xl">
                                    <p className="text-[10px] mb-2 text-center font-bold">ตั้งครรภ์ / ให้นมบุตร?</p>
                                    <div className="flex gap-2">
                                        <button onClick={()=>setAnswers({...answers, pregnancy:'yes'})} className={`flex-1 py-2 rounded-full border ${answers.pregnancy==='yes'?'bg-[#A51D24] text-white':'bg-white'}`}>ใช่</button>
                                        <button onClick={()=>setAnswers({...answers, pregnancy:'no'})} className={`flex-1 py-2 rounded-full border ${answers.pregnancy==='no'?'bg-[#A51D24] text-white':'bg-white'}`}>ไม่</button>
                                    </div>
                                </div>
                                <button onClick={nextStep} disabled={!answers.pregnancy} className="w-full bg-[#A51D24] text-white py-4 rounded-full font-bold disabled:opacity-50">Confirm</button>
                            </div>
                        )}

                        {step === 5 && (
                            <div className="space-y-8 fade-in">
                                <h2 className="text-2xl font-serif font-bold text-gray-800">การใช้ยาคุม</h2>
                                <div className="grid gap-3">
                                    {['pill', 'none'].map(id => (
                                        <button key={id} onClick={() => handleSelect('birthControl', id)} className="text-left p-5 rounded-2xl border border-red-50 bg-[#FDFBF7] text-sm font-medium">
                                            {id === 'pill' ? 'ใช้ยาคุม / ฝัง / ฉีด' : 'ไม่ได้ใช้'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 6 && <ResultDisplay />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
